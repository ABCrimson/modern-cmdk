name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '25.8.0'

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-24.04
    outputs:
      lint-passed: ${{ steps.lint.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - id: lint
        run: pnpm biome check .
      - run: pnpm --filter '@crimson_dev/command' exec tsc --noEmit

  test:
    name: Test (${{ matrix.os }}, shard ${{ matrix.shard }}/4)
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
        shard: [1, 2, 3, 4]
    runs-on: ${{ matrix.os }}
    outputs:
      test-passed: ${{ steps.test.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm -r --filter '!docs' --filter '!playground' --filter '!@crimson_dev/command-monorepo' --parallel run build
      - id: test
        run: pnpm vitest run --coverage --shard=${{ matrix.shard }}/4
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.shard }}
          path: coverage/
          retention-days: 7
          include-hidden-files: true

  e2e:
    name: E2E Tests
    needs: lint
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm -r --filter '!docs' --filter '!playground' --filter '!@crimson_dev/command-monorepo' --parallel run build
      - run: pnpm playwright install --with-deps chromium firefox webkit
      - run: pnpm playwright test
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          include-hidden-files: true

  size:
    name: Bundle Size
    needs: lint
    runs-on: ubuntu-24.04
    outputs:
      size-report: ${{ steps.size.outputs.report }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm -r --filter '!docs' --filter '!playground' --filter '!@crimson_dev/command-monorepo' --parallel run build
      - id: size
        run: |
          pnpm size-limit --json > size-report.json
          {
            echo "report<<EOF"
            cat size-report.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: size-report
          path: size-report.json
          retention-days: 30

  security:
    name: Security Audit
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm audit --audit-level=high || echo "::warning::Security audit found issues"

  bench:
    name: Benchmarks
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm -r --filter '!docs' --filter '!playground' --filter '!@crimson_dev/command-monorepo' --parallel run build
      - run: pnpm bench:ci
      - run: pnpm bench:compare
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-results
          path: benchmarks/results/
          retention-days: 30

  summary:
    name: CI Summary
    needs: [lint, test, e2e, size, bench, security]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Generate summary
        run: |
          echo "## CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint & Typecheck | ${{ needs.lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | ${{ needs.test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| E2E | ${{ needs.e2e.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bundle Size | ${{ needs.size.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Benchmarks | ${{ needs.bench.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security Audit | ${{ needs.security.result }} |" >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if critical jobs failed
        if: needs.lint.result == 'failure' || needs.test.result == 'failure'
        run: exit 1
