name: Bug Report
description: Report a bug in @crimson_dev/command
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - "@crimson_dev/command (core)"
        - "@crimson_dev/command-react"
        - "@crimson_dev/command-search-wasm"
        - "@crimson_dev/command-codemod"
        - "Documentation"
        - "Playground"
      default: 0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened? What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce, or a link to a minimal reproduction (StackBlitz, CodeSandbox, or GitHub repo).
      placeholder: |
        1. Install @crimson_dev/command-react
        2. Create a Command with ...
        3. Type "..." in the input
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node, browser, OS, and package versions.
      render: shell
      placeholder: |
        Node: v25.8.0
        Browser: Chrome 130
        OS: macOS 15.2
        @crimson_dev/command: 0.9.0
        @crimson_dev/command-react: 0.9.0
        React: 19.3.0-canary
        TypeScript: 6.0.1-rc
        Vite: 8.0.0-beta.16
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - "Low -- cosmetic / minor inconvenience"
        - "Medium -- workaround exists"
        - "High -- blocks usage, no workaround"
        - "Critical -- security or data loss"
      default: 1
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have read the [documentation](https://command.crimson.dev)
          required: false
        - label: I can provide a minimal reproduction
          required: false
