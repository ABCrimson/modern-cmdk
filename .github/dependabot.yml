version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      production-dependencies:
        dependency-type: production
        update-types: [minor, patch]
      typescript:
        patterns: ['typescript']
        update-types: [minor, patch]
      biome:
        patterns: ['@biomejs/*']
        update-types: [minor, patch]
      playwright:
        patterns: ['@playwright/*', 'playwright', 'playwright-core']
        update-types: [minor, patch]
      vitest:
        patterns: ['vitest', '@vitest/*']
        update-types: [minor, patch]
    ignore:
      # Pinned to specific pre-release versions — manual update only
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - ci
    commit-message:
      prefix: "ci(deps):"

  - package-ecosystem: cargo
    directory: /packages/command-search-wasm/crate
    schedule:
      interval: monthly
    labels:
      - dependencies
      - wasm
    commit-message:
      prefix: "chore(deps):"
