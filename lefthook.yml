# Lefthook 2.1.2 — parallel execution, skip conditions, zero npm deps
pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx,json,css}"
      run: biome check --staged --no-errors-on-unmatched {staged_files}
    typecheck:
      glob: "*.{ts,tsx}"
      run: tsc --noEmit
      skip:
        - merge
        - rebase

pre-push:
  parallel: true
  commands:
    test:
      run: vitest run --reporter=dot
    size:
      # Only check size if packages changed — skip full rebuild on docs-only pushes
      glob: "packages/*/src/**/*.{ts,tsx}"
      run: pnpm --filter './packages/*' run build && size-limit
